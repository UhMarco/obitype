<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>obitype</title>
    <link rel="stylesheet" href="style.css">
</head>
<script>
    let wrapper;
    let words = [];
    let typed = [];
    let typing = [];

    function evaluate(a, b) {
        let result = [];

        for (let i = 0; i < a.length; i++) {
            if (i >= b.length) {
                result.push("untyped");
            } else if (a[i] == b[i]) {
                result.push("correct");
            } else {
                result.push("incorrect");
            }
        }

        result.concat(Array(Math.max(b.length - a.length, 0)).fill("extra"));

        return result;
    }

    function render() {
        for (let i = 0; i < words.length; i++) {
            let word = words[i];
            let letters = i === typed.length ? typing : typed[i];

            const w = wrapper.children[i];
            const evaluation = i <= typed.length ? evaluate(word, letters) : Array(word.length).fill("untyped");

            for (let j = 0; j < word.length; j++) {
                const l = w.children[j];
                l.innerHTML = word[j];
                l.className = evaluation[j];
            }

            const extra = letters?.length - word.length;

            if (extra > 0) {
                [...letters].slice(word.length).forEach((letter, i) => {
                    const l = w.children[word.length + i] ?? document.createElement("letter");
                    l.innerHTML = letter;
                    l.className = "extra";
                    if (!l.parentElement) w.appendChild(l);
                });
            } else {
                const toRemove = w.children.length - word.length;
                for (let j = 0; j < toRemove; j++) w.removeChild(w.lastChild);
            }
        }
    }

    window.onload = async () => {
        wrapper = document.getElementById("wrapper");

        const res = await fetch("./data/english.json");
        let english = await res.json();

        for (let i = 0; i < 50; i++) {
            words.push(english[Math.floor(Math.random() * english.length)]);
        }

        for (const word of words) {
            const w = document.createElement("word");

            for (const letter of word) {
                const l = document.createElement("letter");
                l.innerHTML = letter;
                l.classList.add("untyped");
                w.appendChild(l);
            }
            wrapper.appendChild(w);
        }
    }


    function canReturn() {
        let index = typed.length - 1;
        if (index < 0) return false;
        return ["extra", "incorrect", "untyped"].some(v => evaluate(words[index], typed[index] ?? []).includes(v));
    }

    let shouldReturn = false;

    document.addEventListener("keydown", (e) => {
        if (
            !e.ctrlKey
            && !e.altKey
            && /^[a-z]$/.test(e.key)
        ) {
            typing.push(e.key.toLowerCase());
            render();
        } else if (e.key === "Backspace") {
            if (typing.length > 0) {
                typing.pop();
            } else if (canReturn()) {
                if (shouldReturn) {
                    typing = [...typed.pop()];
                    shouldReturn = false;
                } else if (typed.length) {
                    shouldReturn = true;
                }
            }
            render();
        } else if (e.key === " " && typing.length > 0) {
            typed.push(typing.join(""));
            typing = [];
            render();
        }
    })
</script>
<body>
    <h1>obitype</h1>
    <div id="wrapper"></div>
</body>
</html>
