<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>obitype</title>
    <link rel="stylesheet" href="style.css">
    <script>
        let wrapper, english, words, typed, typing;

        function start() {
            wrapper.innerHTML = "";
            words = [];
            typed = [];
            typing = [];

            for (let i = 0; i < 50; i++) {
                words.push(english[Math.floor(Math.random() * english.length)]);
            }

            for (const word of words) {
                const w = document.createElement("word");

                for (const letter of word) {
                    const l = document.createElement("letter");
                    l.innerHTML = letter;
                    l.className = wrapper.children.length || w.children.length ? "untyped" : "next";
                    w.appendChild(l);
                }
                wrapper.appendChild(w);
            }
        }

        function evaluate(a, b) {
            let result = [];

            for (let i = 0; i < a.length; i++) {
                if (i >= b.length) {
                    result.push("untyped");
                } else if (a[i] === b[i]) {
                    result.push("correct");
                } else {
                    result.push("incorrect");
                }
            }

            return result.concat(Array(Math.max(b.length - a.length, 0)).fill("extra"));
        }

        function render() {
            for (let i = 0; i < words.length; i++) {
                let word = words[i];
                let letters = i === typed.length ? typing : typed[i];

                const w = wrapper.children[i];

                w.classList.toggle("incorrect", i !== typed.length && wordHasError(i));

                const evaluation = i <= typed.length ? evaluate(word, letters) : Array(word.length).fill("untyped");

                for (let j = 0; j < word.length; j++) {
                    const l = w.children[j];
                    l.innerHTML = word[j];
                    l.className = i === typed.length && j === typing.length ? "next" : evaluation[j];
                }

                for (let j = 0; j < w.children.length - word.length; j++) w.removeChild(w.lastChild);
                const extra = letters?.length - word.length;

                if (extra > 0) {
                    letters.slice(word.length).forEach((letter, i) => {
                        const l = w.children[word.length + i] ?? document.createElement("letter");
                        l.innerHTML = letter;
                        l.className = "extra";
                        if (!l.parentElement) w.appendChild(l);
                    });
                }
            }
        }

        window.onload = async () => {
            wrapper = document.getElementById("wrapper");

            const res = await fetch("./data/english.json");
            english = await res.json();

            start();
        }

        function wordHasError(index) {
            if (index < 0 || index > typed.length) return false;
            return ["extra", "incorrect", "untyped"].some(v => evaluate(words[index], typed[index]).includes(v));
        }

        document.addEventListener("keydown", (e) => {
            if (e.ctrlKey || e.altKey) return;
            if (/^[a-z]$/.test(e.key)) {
                typing.push(e.key.toLowerCase());
                render();
            } else if (e.key === "Backspace") {
                if (typing.length > 0) {
                    typing.pop();
                } else if (wordHasError(typed.length - 1)) {
                    typing = typed.pop();
                }
                render();
            } else if (e.key === " " && typing.length > 0) {
                typed.push(typing);
                typing = [];
                render();
            } else if (e.key === "Tab") {
                e.preventDefault();
                start();
            }
        })
    </script>
</head>
<body>
    <h1>obitype</h1>
    <div id="wrapper"></div>
</body>
</html>
